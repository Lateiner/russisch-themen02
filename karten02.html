<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Flashcards: Freunde & Hobbys</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-front-bg: #ffffff;
            --card-back-bg: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--secondary); }
        .instruction { color: #666; margin-bottom: 30px; text-align: center; }

        /* Container für den 3D-Effekt */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            max-width: 400px;
            height: 250px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        /* Vorder- und Rückseite */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-front {
            background-color: var(--card-front-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .card-back {
            background-color: var(--card-back-bg);
            color: var(--secondary);
            transform: rotateY(180deg);
            border: 2px solid #bdc3c7;
        }

        .russian-text {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .german-text {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .audio-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .audio-btn:hover { transform: scale(1.1); }

        /* Steuerung */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-nav {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--secondary);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-shuffle {
            background: #27ae60;
        }

        .progress {
            margin-top: 15px;
            font-weight: bold;
            color: #666;
        }

        @media (max-width: 450px) {
            .flashcard-container { height: 200px; }
            .russian-text { font-size: 1.5rem; }
            .german-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <h1>Карточки (Lernkarten)</h1>
    <p class="instruction">Tippe auf die Karte, um sie umzudrehen. Nutze das Lautsprecher-Symbol für die Aussprache.</p>

    <div class="flashcard-container">
        <div class="flashcard" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div class="russian-text" id="ru-text">Загрузка...</div>
                <button class="audio-btn" onclick="playAudio(event)">🔊</button>
            </div>
            <div class="card-face card-back">
                <div class="german-text" id="de-text">Laden...</div>
            </div>
        </div>
    </div>

    <div class="progress" id="counter">Karte 1 / 10</div>

    <div class="controls">
        <button class="btn-nav" onclick="prevCard()">◀</button>
        <button class="btn-nav btn-shuffle" onclick="shuffleCards()">Mischen</button>
        <button class="btn-nav" onclick="nextCard()">▶</button>
    </div>

    <script>
        const vocabulary = [
            { ru: "познакомиться", de: "sich kennenlernen" },
            { ru: "друг", de: "der Freund" },
            { ru: "подруга", de: "die Freundin" },
            { ru: "университет", de: "die Universität" },
            { ru: "работать", de: "arbeiten" },
            { ru: "учиться", de: "studieren / lernen" },
            { ru: "переводчик", de: "der Übersetzer" },
            { ru: "путешествовать", de: "reisen" },
            { ru: "свободное время", de: "die Freizeit" },
            { ru: "серьезный", de: "ernst" },
            { ru: "ответственный", de: "verantwortungsbewusst" },
            { ru: "веселый", de: "fröhlich / lustig" }
        ];

        let currentCards = [...vocabulary];
        let currentIndex = 0;
        let maleVoice = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            // Suche nach russischen männlichen Stimmen
            const maleNames = ['Pavel', 'Maxim', 'Yuri', 'Aleksandr', 'Dmitri'];
            maleVoice = voices.find(v => v.lang.startsWith('ru') && 
                maleNames.some(name => v.name.includes(name)));
            
            if (!maleVoice) maleVoice = voices.find(v => v.lang.startsWith('ru'));
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function updateCard() {
            const cardElement = document.getElementById('card');
            cardElement.classList.remove('flipped');
            
            // Kurze Verzögerung für den Textwechsel, damit man es nicht während des Drehens sieht
            setTimeout(() => {
                document.getElementById('ru-text').textContent = currentCards[currentIndex].ru;
                document.getElementById('de-text').textContent = currentCards[currentIndex].de;
                document.getElementById('counter').textContent = `Karte ${currentIndex + 1} / ${currentCards.length}`;
            }, 150);
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function playAudio(event) {
            event.stopPropagation(); // Verhindert das Umdrehen der Karte beim Klicken auf Audio
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(currentCards[currentIndex].ru);
            msg.lang = 'ru-RU';
            msg.rate = 0.8;
            if (maleVoice) msg.voice = maleVoice;
            window.speechSynthesis.speak(msg);
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % currentCards.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + currentCards.length) % currentCards.length;
            updateCard();
        }

        function shuffleCards() {
            currentCards.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            updateCard();
        }

        // Initialisierung
        updateCard();
    </script>
</body>
</html>
