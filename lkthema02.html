<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Lernkartei: Freunde & Beschreibung</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --medium-green: #4caf50;
            --light-green: #e8f5e9;
            --accent-green: #c8e6c9;
            --text-color: #1b5e20;
            --card-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-green);
        }

        .main-container {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        /* Fortschrittsanzeige */
        .progress {
            font-size: 1.1rem;
            font-weight: bold;
            background: var(--accent-green);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* 3D-Karten-Container */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            background: white;
            border: 4px solid var(--medium-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fafafa;
        }

        .card-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            transition: font-size 0.2s;
        }

        .side-label {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* Steuerelemente */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            grid-column: span 2;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--medium-green);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        button:hover {
            background-color: var(--primary-green);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: var(--primary-green);
            font-size: 0.9rem;
        }

        /* Tastatur-Hinweise */
        .shortcuts {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            line-height: 1.5;
        }

        /* Responsivität */
        @media (max-width: 480px) {
            .flashcard-container { height: 250px; }
            h1 { font-size: 1.4rem; }
            button { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Russisch Vokabeltrainer</h1>
    </header>

    <div class="main-container">
        <div class="progress" id="progress-display">1 / 78</div>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="card-face card-front">
                    <span class="side-label">Russisch</span>
                    <div class="card-content" id="front-text">Загрузка...</div>
                </div>
                <div class="card-face card-back">
                    <span class="side-label">Deutsch</span>
                    <div class="card-content" id="back-text">Laden...</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="nav-buttons">
                <button onclick="prevCard(event)">← Vorherige</button>
                <button onclick="nextCard(event)">Nächste →</button>
            </div>
            <button class="btn-secondary" onclick="resetToStart(event)">⤒ An den Anfang</button>
            <button class="btn-secondary" onclick="shuffleCards(event)">🎲 Mischen</button>
        </div>

        <div class="shortcuts">
            Leertaste/Enter: Drehen | Pfeiltasten: Navigieren | Pos1: Anfang
        </div>
    </div>

    <script>
        // Die Vokabelliste
        const rawData = `1.	приве́т – hallo
2.	спаси́бо – danke
3.	кана́л – Kanal
4.	ви́део – Video
5.	знако́миться / познако́миться – sich kennenlernen
6.	дру́г – Freund
7.	подру́га – Freundin
8.	дру́г дру́га – einander / gegenseitig
9.	отвеча́ть / отве́тить – antworten
10.	спра́шивать / спроси́ть – fragen
11.	вопро́с – Frage
12.	подде́рживать / поддержа́ть – unterstützen
13.	помога́ть / помо́чь – helfen
14.	зна́ть / узна́ть – wissen / kennen / erfahren
15.	язы́к – Sprache
16.	говори́ть / поговори́ть – sprechen / reden
17.	учи́ть / научи́ть – lehren / beibringen
18.	расска́зывать / рассказа́ть – erzählen
19.	зва́ть / позва́ть – rufen / heißen
20.	и́мя – Name
21.	ско́лько – wie viel
22.	го́д / ле́т – Jahr / Jahre
23.	когда́ – wann
24.	где́ – wo
25.	университе́т – Universität
26.	про́шлый – vergangen / vorig
27.	неде́ля – Woche
28.	у́лица – Straße
29.	до́лго – lange (Zeitdauer)
30.	давно́ – lange her / schon lange
31.	де́тство – Kindheit
32.	жи́ть / пожи́ть – leben / wohnen
33.	го́род – Stadt
34.	страна́ – Land
35.	друго́й – anderer / zweiter
36.	рабо́тать / порабо́тать – arbeiten
37.	учи́ться / научи́ться – lernen / studieren
38.	магази́н – Geschäft / Laden
39.	продаве́ц – Verkäufer
40.	хоте́ть / захоте́ть – wollen
41.	станови́ться / ста́ть – werden
42.	перево́дчик – Übersetzer
43.	люби́ть / полюби́ть – lieben / gern haben
44.	свобо́дное вре́мя – Freizeit
45.	путеше́ствовать / попутеше́ствовать – reisen
46.	игра́ть / поигра́ть – spielen
47.	гита́ра – Gitarre
48.	спа́ть / поспа́ть – schlafen
49.	занима́ться / заня́ться – sich beschäftigen / etwas unternehmen
50.	вме́сте – zusammen
51.	обы́чно – gewöhnlich / normalerweise
52.	гуля́ть / погуля́ть – spazieren gehen
53.	ходи́ть / сходи́ть – gehen
54.	кафе́ – Café
55.	смотре́ть / посмотре́ть – schauen / sehen
56.	фи́льм – Film
57.	кино́ – Kino
58.	хара́ктер – Charakter
59.	челове́к – Mensch
60.	у́мный – klug
61.	серьёзный – ernst
62.	отве́тственный – verantwortungsbewusst
63.	позити́вный – positiv
64.	откры́тый – offen
65.	весёлый – fröhlich / lustig
66.	зло́й – böse
67.	закры́тый – verschlossen
68.	ду́мать / поду́мать – denken / glauben
69.	пла́н – Plan
70.	до́машнее зада́ние – Hausaufgabe
71.	писа́ть / написа́ть – schreiben
72.	коммента́рий – Kommentar
73.	поле́зно – nützlich
74.	встреча́ться / встре́титься – sich treffen
75.	разгова́ривать / поразгова́ривать – sich unterhalten
76.	И́ра – Ira
77.	Макс – Max
78.	Анжела – Angela`;

        // Daten verarbeiten
        let cards = [];
        rawData.split('\n').forEach(line => {
            const parts = line.split(' – ');
            if (parts.length === 2) {
                // Entferne die Nummer am Anfang
                const frontText = parts[0].replace(/^\d+\.\s*/, '').trim();
                const backText = parts[1].trim();
                cards.push({ front: frontText, back: backText });
            }
        });

        let currentIndex = 0;
        let isFlipped = false;

        const cardElement = document.getElementById('card');
        const frontTextElement = document.getElementById('front-text');
        const backTextElement = document.getElementById('back-text');
        const progressElement = document.getElementById('progress-display');

        // Funktion zur Aktualisierung der Karte
        function updateDisplay() {
            // Falls Karte umgedreht war, erst zurückdrehen
            isFlipped = false;
            cardElement.classList.remove('flipped');
            
            const currentCard = cards[currentIndex];
            
            // Text setzen
            frontTextElement.textContent = currentCard.front;
            backTextElement.textContent = currentCard.back;
            
            // Schriftgröße anpassen
            adjustFontSize(frontTextElement);
            adjustFontSize(backTextElement);
            
            // Fortschritt setzen
            progressElement.textContent = `${currentIndex + 1} / ${cards.length}`;
        }

        // Dynamische Schriftgröße
        function adjustFontSize(el) {
            const len = el.textContent.length;
            if (len > 50) el.style.fontSize = "1.1rem";
            else if (len > 30) el.style.fontSize = "1.4rem";
            else el.style.fontSize = "1.8rem";
        }

        // Navigation
        function nextCard(e) {
            if (e) e.stopPropagation();
            currentIndex = (currentIndex + 1) % cards.length;
            updateDisplay();
        }

        function prevCard(e) {
            if (e) e.stopPropagation();
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateDisplay();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            cardElement.classList.toggle('flipped');
        }

        function shuffleCards(e) {
            if (e) e.stopPropagation();
            // Fisher-Yates Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            updateDisplay();
        }

        function resetToStart(e) {
            if (e) e.stopPropagation();
            currentIndex = 0;
            updateDisplay();
        }

        // Tastatursteuerung
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    flipCard();
                    break;
                case 'ArrowRight':
                    nextCard();
                    break;
                case 'ArrowLeft':
                    prevCard();
                    break;
                case 'Home':
                    resetToStart();
                    break;
            }
        });

        // Initialisierung
        updateDisplay();
    </script>
</body>
</html>
