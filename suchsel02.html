<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Suchsel: Adjektive</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --highlight: #f1c40f;
            --bg: #f4f7f6;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.4rem; margin-bottom: 5px; }
        .instruction { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px; max-width: 500px; }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 600px;
        }

        .word-item {
            background: white;
            padding: 4px 10px;
            border-radius: 12px;
            border: 2px solid #ddd;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .word-item.found {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
            text-decoration: line-through;
        }

        /* Gitter-Container: Erm枚glicht horizontales Scrollen auf kleinen Handys */
        .grid-wrapper {
            width: 100%;
            max-width: 550px;
            overflow-x: auto;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 2px;
            min-width: 450px; /* Garantiert Lesbarkeit auf Mobile */
        }

        .cell {
            aspect-ratio: 1/1;
            background: #fff;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 3px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Zust盲nde */
        .cell.selected { background-color: var(--primary); color: white; }
        .cell.found { background-color: var(--success); color: white; }
        .cell.solved { background-color: var(--highlight); color: #333; }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-solve { background: var(--highlight); color: #333; }
        .btn-reset { background: #95a5a6; color: white; }

        @media (max-width: 500px) {
            .cell { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <h1>袧邪泄写懈 锌褉懈谢邪谐邪褌械谢褜薪褘械</h1>
    <p class="instruction">Klicke den <b>ersten</b> und dann den <b>letzten</b> Buchstaben eines Wortes an. (Nur waagerecht & senkrecht)</p>

    <div class="word-list" id="word-list"></div>

    <div class="grid-wrapper">
        <div id="grid"></div>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="initGame()">Neu starten</button>
        <button class="btn-solve" onclick="showSolution()">L枚sung anzeigen</button>
    </div>

    <script>
        const wordsToFind = ["校袦袧蝎袡", "袙袝小袝袥蝎袡", "袨孝袣袪蝎孝蝎袡", "袩袨袟袠孝袠袙袧蝎袡", "小袝袪鞋袝袟袧蝎袡", "袨孝袙袝孝小孝袙袝袧袧蝎袡"];
        const gridSize = 14;
        let gridData = [];
        let wordLocations = [];
        let firstClick = null;
        let foundWords = [];

        function initGame() {
            gridData = Array(gridSize).fill(null).map(() => Array(gridSize).fill(''));
            wordLocations = [];
            foundWords = [];
            firstClick = null;

            // Wortliste im UI
            const listEl = document.getElementById('word-list');
            listEl.innerHTML = '';
            wordsToFind.forEach(w => {
                const span = document.createElement('span');
                span.className = 'word-item';
                span.id = 'list-' + w;
                span.textContent = w;
                listEl.appendChild(span);
            });

            // W枚rter platzieren
            wordsToFind.forEach(word => {
                let placed = false;
                while (!placed) {
                    const isVertical = Math.random() > 0.5;
                    const row = Math.floor(Math.random() * (isVertical ? gridSize - word.length : gridSize));
                    const col = Math.floor(Math.random() * (isVertical ? gridSize : gridSize - word.length));

                    if (canPlace(word, row, col, isVertical)) {
                        let coords = [];
                        for (let i = 0; i < word.length; i++) {
                            const r = isVertical ? row + i : row;
                            const c = isVertical ? col : col + i;
                            gridData[r][c] = word[i];
                            coords.push({r, c});
                        }
                        wordLocations.push({ word, coords });
                        placed = true;
                    }
                }
            });

            // Gitter mit Zufallsbuchstaben f眉llen
            const alphabet = "袗袘袙袚袛袝衼袞袟袠袡袣袥袦袧袨袩袪小孝校肖啸笑效楔些蝎鞋协挟携";
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (gridData[r][c] === '') {
                        gridData[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    }
                }
            }
            renderGrid();
        }

        function canPlace(word, row, col, isVertical) {
            for (let i = 0; i < word.length; i++) {
                const r = isVertical ? row + i : row;
                const c = isVertical ? col : col + i;
                if (gridData[r][c] !== '' && gridData[r][c] !== word[i]) return false;
            }
            return true;
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = gridData[r][c];
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.onclick = () => handleCellClick(r, c, cell);
                    container.appendChild(cell);
                }
            }
        }

        function handleCellClick(r, c, el) {
            if (el.classList.contains('found')) return;

            if (!firstClick) {
                firstClick = { r, c, el };
                el.classList.add('selected');
            } else {
                const secondClick = { r, c, el };
                checkSelection(firstClick, secondClick);
                firstClick.el.classList.remove('selected');
                firstClick = null;
            }
        }

        function checkSelection(start, end) {
            const selectedCoords = [];
            if (start.r === end.r) { // Horizontal
                const min = Math.min(start.c, end.c);
                const max = Math.max(start.c, end.c);
                for (let i = min; i <= max; i++) selectedCoords.push(`${start.r}-${i}`);
            } else if (start.c === end.c) { // Senkrecht
                const min = Math.min(start.r, end.r);
                const max = Math.max(start.r, end.r);
                for (let i = min; i <= max; i++) selectedCoords.push(`${i}-${start.c}`);
            }

            if (selectedCoords.length === 0) return;

            // Pr眉fen, ob diese Koordinaten exakt zu einem versteckten Wort geh枚ren
            wordLocations.forEach(loc => {
                if (foundWords.includes(loc.word)) return;
                
                const locCoordsStr = loc.coords.map(c => `${c.r}-${c.c}`);
                if (selectedCoords.length === locCoordsStr.length && 
                    selectedCoords.every(val => locCoordsStr.includes(val))) {
                    
                    // Gefunden!
                    foundWords.push(loc.word);
                    document.getElementById('list-' + loc.word).classList.add('found');
                    loc.coords.forEach(c => {
                        document.querySelector(`[data-r='${c.r}'][data-c='${c.c}']`).classList.add('found');
                    });
                }
            });
        }

        function showSolution() {
            wordLocations.forEach(loc => {
                loc.coords.forEach(c => {
                    document.querySelector(`[data-r='${c.r}'][data-c='${c.c}']`).classList.add('solved');
                });
                document.getElementById('list-' + loc.word).classList.add('found');
            });
        }

        initGame();
    </script>
</body>
</html>
