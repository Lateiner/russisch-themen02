<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch lernen: Richtig oder Falsch</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #3498db;
            --success: #2ecc71;
            --error: #e74c3c;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .quiz-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 1.4rem; margin-bottom: 20px; color: var(--primary); }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-opt {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        /* Farben für die Auswahl */
        .btn-true { color: var(--success); border-color: var(--success); }
        .btn-false { color: var(--error); border-color: var(--error); }

        .btn-true.selected-correct { background-color: var(--success); color: white; }
        .btn-false.selected-correct { background-color: var(--error); color: white; }
        
        .btn-opt.disabled { pointer-events: none; opacity: 0.6; }

        .feedback-area {
            margin-top: 25px;
            min-height: 50px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .cmd-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-solve { background: #95a5a6; color: white; }

        @media (max-width: 500px) {
            .options { grid-template-columns: 1fr; }
            .question-box { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1 id="title">Верно или неверно?</h1>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="question-box" id="question">
            Lade Frage...
        </div>

        <div class="options" id="options">
            <button class="btn-opt btn-true" onclick="checkAnswer(true)">Верно (Richtig)</button>
            <button class="btn-opt btn-false" onclick="checkAnswer(false)">Неверно (Falsch)</button>
        </div>

        <div class="feedback-area" id="feedback"></div>

        <div class="controls">
            <button class="cmd-btn btn-solve" id="solve-btn" onclick="showSolution()">Lösung anzeigen</button>
            <button class="cmd-btn btn-next" id="next-btn" style="display:none;" onclick="nextQuestion()">Nächste Frage</button>
            <button class="cmd-btn btn-next" id="restart-btn" style="display:none;" onclick="resetQuiz()">Neu starten</button>
        </div>
    </div>

    <script>
        const questions = [
            { text: "Макс работает переводчиком.", isTrue: false },
            { text: "Анжела учится в университете.", isTrue: true },
            { text: "Максу двадцать пять лет.", isTrue: true },
            { text: "Анжела хочет стать переводчиком.", isTrue: true },
            { text: "Макс любит играть на гитаре.", isTrue: false },
            { text: "Друзья познакомились в университете.", isTrue: true },
            { text: "Макс живет в другом городе.", isTrue: false },
            { text: "Анжела открытый и позитивный человек.", isTrue: true }
        ];

        let currentIdx = 0;
        let score = 0;

        function updateUI() {
            const q = questions[currentIdx];
            document.getElementById('question').textContent = q.text;
            document.getElementById('feedback').textContent = "";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('solve-btn').style.display = "inline-block";
            
            const btns = document.querySelectorAll('.btn-opt');
            btns.forEach(b => {
                b.classList.remove('selected-correct', 'disabled');
                b.style.backgroundColor = "white";
                b.style.color = b.classList.contains('btn-true') ? "var(--success)" : "var(--error)";
            });

            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = progress + "%";
        }

        function checkAnswer(userChoice) {
            const q = questions[currentIdx];
            const feedback = document.getElementById('feedback');
            const trueBtn = document.querySelector('.btn-true');
            const falseBtn = document.querySelector('.btn-false');

            if (userChoice === q.isTrue) {
                feedback.textContent = "Правильно! (Richtig!)";
                feedback.style.color = "var(--success)";
                score++;
            } else {
                feedback.textContent = "Неправильно! (Falsch!)";
                feedback.style.color = "var(--error)";
            }

            // Buttons highlighten
            if (q.isTrue) {
                trueBtn.classList.add('selected-correct');
            } else {
                falseBtn.classList.add('selected-correct');
            }

            disableOptions();
            document.getElementById('next-btn').style.display = "inline-block";
            document.getElementById('solve-btn').style.display = "none";
        }

        function showSolution() {
            const q = questions[currentIdx];
            const feedback = document.getElementById('feedback');
            feedback.textContent = "Die richtige Antwort ist: " + (q.isTrue ? "Верно" : "Неверно");
            feedback.style.color = "var(--primary)";
            
            if (q.isTrue) {
                document.querySelector('.btn-true').classList.add('selected-correct');
            } else {
                document.querySelector('.btn-false').classList.add('selected-correct');
            }
            
            disableOptions();
            document.getElementById('next-btn').style.display = "inline-block";
            document.getElementById('solve-btn').style.display = "none";
        }

        function disableOptions() {
            document.querySelectorAll('.btn-opt').forEach(b => b.classList.add('disabled'));
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                updateUI();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('progress').style.width = "100%";
            document.getElementById('question').innerHTML = `Quiz beendet!<br>Deine Punktzahl: ${score} von ${questions.length}`;
            document.getElementById('options').style.display = "none";
            document.getElementById('feedback').textContent = "";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('solve-btn').style.display = "none";
            document.getElementById('restart-btn').style.display = "inline-block";
        }

        function resetQuiz() {
            currentIdx = 0;
            score = 0;
            document.getElementById('options').style.display = "grid";
            document.getElementById('restart-btn').style.display = "none";
            updateUI();
        }

        // Initialisierung
        updateUI();
    </script>
</body>
</html>
